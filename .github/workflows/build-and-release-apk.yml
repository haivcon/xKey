name: Build and Release APK

on:
  push:
    tags:
      - 'v*' # Only run when a tag with prefix "v" is pushed (e.g., v4.0.0)
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build & Release Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required permission to create a new Release

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm' # Enable npm cache

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗️ Build Web App (Vite)
        run: npm run build

      - name: 🔄 Sync Capacitor
        run: npx cap sync android

      - name: ☕ Set up Java (for Android build)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 💾 Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: 🔨 Build Android APK & AAB (Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleGithubRelease bundlePlayRelease

      - name: 🔑 Sign GitHub APK
        id: sign_apk
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/github/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: 🔑 Sign Google Play AAB
        id: sign_aab
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/bundle/playRelease
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: 🔍 Extract version from package.json
        id: get_version
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

      - name: 🏷️ Rename Files
        run: |
          APK_NAME="xKey-GitHub-v${{ env.APP_VERSION }}.apk"
          AAB_NAME="xKey-GooglePlay-v${{ env.APP_VERSION }}.aab"
          mv ${{steps.sign_apk.outputs.signedReleaseFile}} "$APK_NAME"
          mv ${{steps.sign_aab.outputs.signedReleaseFile}} "$AAB_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "AAB_NAME=$AAB_NAME" >> $GITHUB_ENV

      - name: 🚀 Auto-Release on GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "🔑xKey v${{ env.APP_VERSION }}"
          body: "Automatically optimized and securely signed releases.\n\n**Version:** v${{ env.APP_VERSION }}\n- **APK**: GitHub/manual-install build using package `com.haivcon.xkey.github`, so it can coexist with the Google Play app.\n- **AAB**: Google Play Console build using package `com.haivcon.xkey`."
          files: |
            ${{ env.APK_NAME }}
            ${{ env.AAB_NAME }}
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
