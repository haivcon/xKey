name: Build and Release APK

on:
  push:
    tags:
      - 'v*' # Only run when a tag with prefix "v" is pushed (e.g., v4.0.0)
  workflow_dispatch: # Allow manual trigger
    inputs:
      confirm_release:
        description: 'Type RELEASE to confirm manual release'
        required: true
        type: string

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release readiness
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm' # Enable npm cache

      - name: 📦 Install locked dependencies
        run: npm ci

      - name: 🧾 Confirm manual release
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirm_release }}" != "RELEASE" ]; then
            echo "Manual release requires confirm_release=RELEASE."
            exit 1
          fi

      - name: 🔎 Type check
        run: npm run type-check

      - name: 🧹 Lint
        run: npm run lint

      - name: 🧪 Run focused tests
        run: npm run test

      - name: 🛡️ Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  build:
    name: Build & Release Android APK
    runs-on: ubuntu-latest
    needs: verify
    environment: production-release
    permissions:
      contents: write # Required permission to create a new Release
      attestations: write # Required to publish build provenance attestations
      id-token: write # Required by artifact attestations

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm' # Enable npm cache

      - name: 📦 Install locked dependencies
        run: npm ci

      - name: 🔖 Verify tag matches package version
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          APP_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$APP_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version v$TAG_VERSION does not match package.json version v$APP_VERSION."
            exit 1
          fi

          echo "Tag version matches package.json: v$APP_VERSION"

      - name: 🏗️ Build Web App (Vite)
        env:
          XKEY_INTEGRITY_PUBLIC_KEY_PEM: ${{ secrets.XKEY_INTEGRITY_PUBLIC_KEY_PEM }}
          XKEY_INTEGRITY_PRIVATE_KEY_PEM: ${{ secrets.XKEY_INTEGRITY_PRIVATE_KEY_PEM }}
        run: npm run build

      - name: 🔐 Scan built assets for bundled private key material
        run: |
          set -euo pipefail
          if grep -R -E -- "-----BEGIN [A-Z ]*PRIVATE KEY-----" dist; then
            echo "Private key material was found in dist."
            exit 1
          fi

      - name: 🔄 Sync Capacitor
        run: npx cap sync android

      - name: ☕ Set up Java (for Android build)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 💾 Setup Gradle Cache
        uses: gradle/actions/setup-gradle@d9c87d481d55275bb5441eef3fe0e46805f9ef70 # v3

      - name: 🔨 Build Android APK & AAB (Release)
        run: |
          set -euo pipefail
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease

      - name: 🔑 Sign GitHub APK
        id: sign_apk
        uses: r0adkll/sign-android-release@349ebdef58775b1e0d8099458af0816dc79b6407 # v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: 🔑 Sign Google Play AAB
        id: sign_aab
        uses: r0adkll/sign-android-release@349ebdef58775b1e0d8099458af0816dc79b6407 # v1
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: 🔍 Extract version from package.json
        id: get_version
        run: |
          set -euo pipefail
          APP_VERSION=$(node -p "require('./package.json').version")
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

      - name: 🏷️ Rename Files
        run: |
          set -euo pipefail
          APK_NAME="xKey-GitHub-v${{ env.APP_VERSION }}.apk"
          AAB_NAME="xKey-GooglePlay-v${{ env.APP_VERSION }}.aab"
          mv "${{ steps.sign_apk.outputs.signedReleaseFile }}" "$APK_NAME"
          mv "${{ steps.sign_aab.outputs.signedReleaseFile }}" "$AAB_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "AAB_NAME=$AAB_NAME" >> $GITHUB_ENV

      - name: ✅ Verify APK signature
        run: |
          set -euo pipefail
          APKSIGNER="${ANDROID_HOME}/build-tools/34.0.0/apksigner"
          if [ ! -x "$APKSIGNER" ]; then
            APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)
          fi
          "$APKSIGNER" verify --verbose --print-certs "$APK_NAME"

      - name: ✅ Verify AAB signature
        run: |
          set -euo pipefail
          jarsigner -verify -verbose -certs "$AAB_NAME"

      - name: 🧾 Generate release checksums
        run: |
          set -euo pipefail
          sha256sum "$APK_NAME" > "$APK_NAME.sha256"
          sha256sum "$AAB_NAME" > "$AAB_NAME.sha256"
          sha512sum "$APK_NAME" > "$APK_NAME.sha512"
          sha512sum "$AAB_NAME" > "$AAB_NAME.sha512"

      - name: 🧬 Attest release artifacts
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            ${{ env.APK_NAME }}
            ${{ env.AAB_NAME }}

      - name: 🚀 Auto-Release on GitHub
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: "v${{ env.APP_VERSION }}"
          name: "🔑xKey v${{ env.APP_VERSION }}"
          body: |
            Automatically optimized and securely signed release.

            **Version:** v${{ env.APP_VERSION }}

            ## Download for Android users

            If you want to install xKey directly on an Android device, download this file:

            **`${{ env.APK_NAME }}`**

            This is the signed Android APK intended for normal installation outside Google Play.

            ## Files for developers and verification

            - **`${{ env.AAB_NAME }}`** — Android App Bundle for Google Play Console distribution.
            - **`.sha256` files** — SHA-256 checksums for verifying downloaded artifacts.
            - **`.sha512` files** — SHA-512 checksums for additional integrity verification.
            - **Source code archives** — Automatically generated by GitHub from the release tag.

            Most users only need the APK file. The checksum files are optional and are provided for developers, auditors, and users who want to verify artifact integrity.
          files: |
            ${{ env.APK_NAME }}
            ${{ env.AAB_NAME }}
            ${{ env.APK_NAME }}.sha256
            ${{ env.AAB_NAME }}.sha256
            ${{ env.APK_NAME }}.sha512
            ${{ env.AAB_NAME }}.sha512
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
