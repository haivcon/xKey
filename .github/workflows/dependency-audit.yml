name: Dependency audit

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Create production dependency report
        run: npm run audit:report

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: xkey-production-dependency-audit
          path: audit-report.json
          retention-days: 30
